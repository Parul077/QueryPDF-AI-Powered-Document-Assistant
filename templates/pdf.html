<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QueryPDF | Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">
    <nav class="border-b border-slate-800 bg-slate-900/50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tighter text-indigo-400">QUERY<span class="text-white">PDF</span></a>
            <div class="flex gap-8 text-sm font-medium">
                <a href="/" class="hover:text-indigo-400 transition">Home</a>
                <a href="/chat_ui" class="hover:text-indigo-400 transition">AI Assistant</a>
                <a href="/pdf_view" class="text-indigo-400">Catalog</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-4 bg-slate-800 rounded-2xl border border-slate-700 h-[600px] flex flex-col">
                <div class="p-4 border-b border-slate-700 font-bold text-indigo-400">Library Documents</div>
                <div id="pdf-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                    <div class="p-4 text-center text-slate-500 italic">Syncing catalog...</div>
                </div>
            </div>
            <div class="col-span-8 bg-slate-200 rounded-2xl border border-slate-700 h-[600px] flex items-center justify-center overflow-hidden">
                <div id="no-selection" class="text-slate-500 text-center">
                    <i class="fas fa-file-pdf text-5xl mb-4"></i>
                    <p>Select a document to preview content</p>
                </div>
                <iframe id="pdfViewer" src="" class="w-full h-full hidden"></iframe>
            </div>
        </div>
    </main>

<script>
async function loadCatalog() {
    const catalogList = document.getElementById('pdf-list'); // ✅ FIXED ID

    try {
        const response = await fetch('/list_documents');
        const data = await response.json();

        if (data.documents && data.documents.length > 0) {
            catalogList.innerHTML = data.documents.map(doc => `
    <div
        class="group p-4 rounded-xl border border-slate-700 bg-slate-800
               hover:bg-slate-700 hover:border-indigo-500
               cursor-pointer transition-all duration-200"
        onclick="openPDF('${doc}', this)"
    >
        <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-slate-200 group-hover:text-white">
                ${doc.replace(".pdf", "")}
            </span>
            <span class="text-xs text-slate-400 group-hover:text-indigo-400">
                PDF
            </span>
        </div>
    </div>
`).join('');
        } else {
            catalogList.innerHTML = "No PDFs found.";
        }
    } catch (error) {
        catalogList.innerHTML = "Error loading catalog.";
        console.error(error);
    }
}

function openPDF(filename, element) {
    document.getElementById('no-selection').classList.add('hidden');

    const viewer = document.getElementById('pdfViewer');
    viewer.src = `/pdf/${filename}`;
    viewer.classList.remove('hidden');

    // 🔥 Remove active class from all
    document.querySelectorAll('#pdf-list > div').forEach(el => {
        el.classList.remove('bg-indigo-600', 'border-indigo-500');
    });

    // 🔥 Add active class to selected
    element.classList.add('bg-indigo-600', 'border-indigo-500');
}

document.addEventListener('DOMContentLoaded', loadCatalog);
</script>
</body>
</html>
