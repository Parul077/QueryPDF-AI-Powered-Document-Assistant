<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryPDF | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tighter text-indigo-400">QUERY<span class="text-white">PDF</span></a>
            <div class="flex gap-8 text-sm font-medium">
                <a href="/" class="text-indigo-400">Home</a>
                <a href="/chat_ui" class="hover:text-indigo-400 transition">AI Assistant</a>
                <a href="/pdf_view" class="hover:text-indigo-400 transition">Catalog</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-20 pb-12">
        <div class="bg-slate-800/50 border border-slate-700 rounded-3xl p-12 text-center shadow-2xl">
            <h1 class="text-5xl font-extrabold mb-6 bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                Converse with Ease: Your Multi-Document Companion
            </h1>
            <p class="text-slate-400 text-lg mb-10 max-w-2xl mx-auto">
                Unlock the power of conversational AI to effortlessly navigate through multiple documents. Simplify research and elevate productivity.
            </p>
            <div class="flex justify-center gap-4">
                <a href="/chat_ui" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-xl font-semibold transition transform hover:-translate-y-1">
                    Start Chatting
                </a>
                <a href="/pdf_view" class="bg-slate-700 hover:bg-slate-600 px-8 py-3 rounded-xl font-semibold transition">
                    View Catalog
                </a>
            </div>
        </div>
    </main>
</body>
</html>
